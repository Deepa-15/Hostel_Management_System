# ============================================
# CI/CD Pipeline — Hostel Management System
# ============================================
# Runs on every push and pull request to main.
# Steps: Build → Test → (optional) Package

name: CI - Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the project (compile + run tests)
      - name: Build with Maven
        run: ./mvnw clean verify --batch-mode --no-transfer-progress

      # 4. Upload test reports as artifact (available in Actions tab)
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
