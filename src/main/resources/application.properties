# ============================================
# Hostel Management System - Application Config
# ============================================

# Application Name
spring.application.name=hostel-management-system

# ============================================
# DATABASE CONFIGURATION
# ============================================
# --- MySQL Configuration (Primary - uncomment to use) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/hostel_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- H2 In-Memory Database (For easy testing - active by default) ---
spring.datasource.url=jdbc:h2:mem:hosteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# THYMELEAF
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# SERVER
# ============================================
server.port=8080
server.error.whitelabel.enabled=false

# ============================================
# LOGGING
# ============================================
logging.level.com.hostel=DEBUG
logging.level.org.springframework.security=DEBUG
