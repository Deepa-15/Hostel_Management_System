<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Hostel Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="logo">
                <div class="icon">🏠</div>
                <h1>Hostel Management</h1>
                <p>Sign in to your account</p>
            </div>

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="alert alert-error">
                ⚠️ <span th:text="${errorMessage}"></span>
            </div>
            <div th:if="${successMessage}" class="alert alert-success">
                ✅ <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                    Sign In
                </button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account?
                <a th:href="@{/register}">Register here</a>
            </p>

            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted);">
                <p style="font-weight: 600; margin-bottom: 0.5rem;">Demo Credentials:</p>
                <p>Admin: admin / admin123</p>
                <p>Warden: warden1 / warden123</p>
                <p>Student: student1 / student123</p>
            </div>
        </div>
    </div>
</body>
</html>
