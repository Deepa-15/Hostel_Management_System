<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Hostel Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in" style="max-width: 500px;">
            <div class="logo">
                <div class="icon">🏠</div>
                <h1>Create Account</h1>
                <p>Register for Hostel Management System</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-error">
                ⚠️ <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="form-control"
                           placeholder="Enter your full name" required>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control"
                               placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="Choose a password" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control"
                               placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" class="form-control"
                               placeholder="Phone number">
                    </div>
                </div>

                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" name="role" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="STUDENT">Student</option>
                        <option value="WARDEN">Warden</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Create Account
                </button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account?
                <a th:href="@{/login}">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
